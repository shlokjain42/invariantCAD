name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [22.13.0, 24.x, 26.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source and packed package
        run: pnpm verify

      - name: Measure coverage
        if: matrix.node == '26.x'
        run: pnpm coverage

      - name: Execute the reference benchmark protocol
        if: matrix.node == '26.x'
        run: |
          mkdir -p .artifacts
          pnpm benchmark:reference-models:ci > .artifacts/reference-models-v2.json

      - name: Enforce dependency advisory policy
        if: matrix.node == '26.x'
        run: pnpm audit:release

      - name: Validate Mintlify site
        if: matrix.node == '24.x'
        run: pnpm docs:release-check

  browser:
    name: Browser smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.x
          cache: pnpm
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test production browser bundle
        run: pnpm test:browser
