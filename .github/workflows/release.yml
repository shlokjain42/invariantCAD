name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish tagged package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.x
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted-publishing support
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify tag matches package version
        run: >-
          node -e "const expected = 'v' + require('./package.json').version;
          if (process.env.GITHUB_REF_NAME !== expected)
          throw new Error('Expected tag ' + expected + ', received ' +
          process.env.GITHUB_REF_NAME)"

      - name: Run release acceptance suite
        run: pnpm release:check

      - name: Publish through npm trusted publishing
        run: npm publish --access public --provenance
