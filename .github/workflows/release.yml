name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: invariantcad-npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish tagged package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify annotated release tag
        shell: bash
        run: |
          set -euo pipefail
          expected="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "::error::Publish must be dispatched from an annotated release tag."
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "::error::Expected tag $expected, received $GITHUB_REF_NAME."
            exit 1
          fi

          tag_ref="refs/tags/$GITHUB_REF_NAME"
          if [[ "$(git cat-file -t "$tag_ref")" != "tag" ]]; then
            echo "::error::$GITHUB_REF_NAME is not an annotated tag."
            exit 1
          fi
          tag_commit="$(git rev-parse --verify "$tag_ref^{commit}")"
          if [[ "$tag_commit" != "$(git rev-parse HEAD)" ]]; then
            echo "::error::$GITHUB_REF_NAME does not point at the checked-out release commit."
            exit 1
          fi

          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor \
            "$tag_commit" refs/remotes/origin/main; then
            echo "::error::The tagged release commit is not contained in origin/main."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted-publishing support
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release acceptance suite
        run: pnpm release:check

      - name: Publish through npm trusted publishing
        run: npm publish --access public --provenance
